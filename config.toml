baseURL = "https://meisterlama.github.io/"
languageCode = "en"

theme = "hugo-coder"

paginate = 100
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true
enableEmoji = true

[params]
    keywords = "blog"
    # avatarURL = "https://www.gravatar.com/avatar/daecb64e66a76b129ae991133315d8e2?s=200"
    gravatar = "baptiste_suzon@hotmail.com"
    colorScheme = "auto"
    customCSS = ["css/cv.css"]
    customSCSS = ["scss/cv.scss"]
    customJS = ["js/cv.js"]


[taxonomies]
    category = "categories"
    series = "series"
    tag = "tags"

## SOCIALS

