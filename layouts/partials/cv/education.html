<h2>Education</h2>
<ul>

    {{ if eq .Params.type "education"}}

        <p><i>{{.Params.duration}}</i></p>
        <span class="itemLine"></span>
        <p>{{.Params.formation}}</p>
      </li>
    {{ end }}
  {{- end -}}
</ul>
